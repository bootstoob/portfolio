<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
</head>

<body>

  <h1>Ejercicio 19: </h1>
  <p>
    Realizar un script que escriba los números pares que se
    encuentran entre el 1 y el 20.
  </p>

  <script>
    for (var i = 1; i <= 20; i ++) {
      if (i % 2 == 0) {
      document.write(i + ", ");
      }
    }
  </script>

</body>

</html>
