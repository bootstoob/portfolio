<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
</head>

<body>

  <h1>Comprobación de Resta y Paridad</h1>

  <form id="numerosForm">
    <label for="numero1">Primer Número:</label>
    <input type="number" id="numero1" name="numero1" required>
    <br>
    <label for="numero2">Segundo Número:</label>
    <input type="number" id="numero2" name="numero2" required>
    <br>
    <button id="calcularBtn">Calcular Resta y Paridad</button>
  </form>

  <script>
    document.getElementById("numerosForm").onsubmit = function(event) {

      var numero1 = document.getElementById("numero1").value;
      var numero2 = document.getElementById("numero2").value;

      var resta = numero1 - numero2;
      console.log(resta);

      if (resta > 0) {
        console.log("La resta es mayor a 0");
        if (resta % 2 === 0) {
          console.log("Es par");
        } else {
          console.log("Es impar");
        }
      } else if (resta <= 0) {
        console.log("La resta es menor o igual a 0");
      }
    };
  </script>

</body>

</html>
