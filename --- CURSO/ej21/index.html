<body>

  <h1>Ejercicio21:</h1>
  <p>
    Realizar un script que nos calcule la suma de los 100 primeros números
    pares sacándola por pantalla, usar una estructura while.
  </p>



  <script>
    var contador = 1;
    var suma = 0;

    var contador = 1;

    for ( contador; contador <= 100; contador ++) {
      if (contador % 2 === 0) {
        suma += contador;
      }
    }

      document.write(suma);

  </script>
</body>
