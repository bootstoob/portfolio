<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
</head>

<body>

  <form id="cuentaForm">
    <label for="comida1">Total de la comida1:</label>
    <input type="text" id="comida1" name="comida1">
    <br>
    <label for="comida2">Total de la comida2:</label>
    <input type="text" id="comida2" name="comida2">
    <br>
    <br>
    <label for="bebida1">Total de la bebida1:</label>
    <input type="text" id="bebida1" name="bebida1">
    <br>
    <label for="bebida2">Total de la bebida2:</label>
    <input type="text" id="bebida2" name="bebida2">
    <br>
    <hr>
    <button type="submit">Calcular</button>
  </form>

  <div id="resultado">
    <h2>Resultado</h2>
    <p id="totalComida"></p>
    <p id="totalBebida"></p>
    <p id="totalCena"></p>
  </div>

  <script>
    function validarInput(input) {
      if (!/^\d*$/.test(input.value)) {
        alert("Introduce sólo números enteros.");
        input.value = "";
      }
    }

    document.getElementById("comida1").oninput = function() {
      validarInput(this);
    };
    document.getElementById("comida2").oninput = function() {
      validarInput(this);
    };
    document.getElementById("bebida1").oninput = function() {
      validarInput(this);
    };
    document.getElementById("bebida2").oninput = function() {
      validarInput(this);
    };

    document.getElementById("cuentaForm").onsubmit = function(event) {

      var comida1 = parseInt(document.getElementById("comida1").value); 
      var comida2 = parseInt(document.getElementById("comida2").value);
      var bebida1 = parseInt(document.getElementById("bebida1").value);
      var bebida2 = parseInt(document.getElementById("bebida2").value);

      var totalComida = comida1 + comida2;
      var totalBebida = bebida1 + bebida2;
      var totalCena = totalComida + totalBebida;

      document.getElementById("totalComida").innerText  = "Total de la comida: $" + totalComida;
      document.getElementById("totalBebida").innerText  = "Total de la bebida: $" + totalBebida;
      document.getElementById("totalCena").innerText    = "Total completo de la cena: $" + totalCena;
    };
  </script>
</body>

</html>
