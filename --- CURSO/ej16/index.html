<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
</head>

<body>

  <h1>Impar y Primo</h1>

  <script>
    function comprobarNumeroParImpar() {
      var numero;
      do {
        numero = parseInt(prompt("Introduce un número del 1 al 100:"));
      } while (numero % 2 === 0 || numero < 1 || numero > 100 || numero % 1 !== 0 || numero % numero !== 0);
    }
    comprobarNumeroParImpar();
  </script>

</body>

</html>
