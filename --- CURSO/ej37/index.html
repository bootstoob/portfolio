  <h1>Ejercicio 37:</h1>
  <p>
     :Crear un array que almacene los siete días de la semana. Luego rellena el array
    con los días de la semana.  </p>

  <hr>
  
  <script>

    var diasSemana = [];

    diasSemana.push("Lunes");
    diasSemana.push("Martes");
    diasSemana.push("Miércoles");
    diasSemana.push("Jueves");
    diasSemana.push("Viernes");
    diasSemana.push("Sábado");
    diasSemana.push("Domingo");

    console.log("Días de la semana:", diasSemana);
    
  </script>
