<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
</head>

<body>

  <h1>letra "A" VALIDADA!</h1>

  <script>
    function validarLetraA() {
      for (;;) {
        letra = prompt("introduce la letra A en mayúsculas:");
        if (letra === "A") {
          alert("Correcto!!");
          break;
        } else {
          alert("ERROR, inténtalo de nuevo:");
        }
      }
    }
    validarLetraA();
  </script>

</body>

</html>
