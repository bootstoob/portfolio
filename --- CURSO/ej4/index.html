<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
</head>

<body>

  <h1>Conversor de Grados</h1>

  <form id="conversorForm">
    <label for="gradosCentigrados">Grados Centígrados:</label>
    <input type="number" id="gradosCentigrados" name="gradosCentigrados" required>
    <br>
    <button type="submit">Convertir</button>
  </form>

  <div id="resultado"></div>

  <script>
    document.getElementById("conversorForm").onsubmit = function(event) {

      var gradosCentigrados = document.getElementById("gradosCentigrados").value;

      var gradosKelvin = gradosCentigrados + 273.15;
      var gradosFahrenheit = (gradosCentigrados * 9/5) + 32;

      var resultadoHTML = "<h2>Conversión de Grados</h2>" +
                          "<p>Grados Centígrados: " + gradosCentigrados + "°C</p>" +
                          "<p>Grados Kelvin: " + gradosKelvin + " K</p>" +
                          "<p>Grados Fahrenheit: " + gradosFahrenheit + " °F</p>";

      document.getElementById("resultado").innerHTML = resultadoHTML;
    };
  </script>

</body>

</html>
