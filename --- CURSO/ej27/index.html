<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
</head>

<body>

  <h1>Ejercicio 27:</h1>
  <p>
    Crear un programa que pida un número de teléfono y un DNI y compruebe si son correctos.
  </p>


  <form id="validacionForm">
    <label for="telefono">Número de teléfono:</label>
    <input type="text" id="telefono" name="telefono" required><br><br>

    <label for="dni">DNI:</label>
    <input type="text" id="dni" name="dni" required><br><br>

    <button type="button" onclick="validarDniTlf()">validarDniTlf</button>
  </form>

  <script>

    function validarDniTlf() {

      var telefono = document.getElementById("telefono").value;
      var dni = document.getElementById("dni").value;

      var filtroTelef = /^\d{9}$/;
      var filtroDni = /^\d{8}[a-zA-Z]$/;


      if (filtroTelef.test(telefono)) {
        alert("telf válida");
      } else {
        alert("telf inválida");
      }
      if (filtroDni.test(dni)) {
        alert("dni válida");
      } else {
        alert("dni inválida");
      }
    }


  </script>

</body>

</html>
