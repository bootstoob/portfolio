<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
</head>

<body>

  <h1>Ejercicio22:</h1>
  <p>
    Después realiza el mismo ejercicio con una sentencia for.
  </p>

  <script>
    var contador = 1;
    var suma = 0;
    var numerosPares = 0;

    while (contador <= 100) {
      if (contador % 2 === 0) {
        suma += contador;
        numerosPares++;
      }
      contador++;
    }

    document.write(suma);

  </script>

</body>

</html>
