<body>

  <h1>Ejercicio 23:</h1>
  <p>
    Realizar un programa que va a leer números de forma indefinida hasta
    que el usuario introduzca el 50.
  </p>

  <script>
    var numero;
    while (numero !== 50){
      numero = parseInt(prompt("Introduce el número 50:"));
    } 
    alert("Has introducido el número 50");

  </script>

</body>
