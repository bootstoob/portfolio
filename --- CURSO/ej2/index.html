<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
</head>

<body>
  <h1>Calculadora de Precio de Venta</h1>

  <form id="precioForm">
    <label for="precioNeto">Precio neto del artículo:</label>
    <input type="number" id="precioNeto" name="precioNeto" required>
    <br>
    <button type="submit">Calcular Precio de Venta</button>
  </form>

  <div id="resultado"></div>

  <script>
    document.getElementById("precioForm").onsubmit = function(event) {
      event.preventDefault();

      var precioNeto = document.getElementById("precioNeto").value;

      var beneficio = precioNeto * 0.10; 
      var iva = (precioNeto + beneficio) * 0.21;
      var precioVenta = precioNeto + beneficio + iva;

      var resultadoHTML = "<h2>Precio de Venta al Público:</h2>" +
                          "<p>Precio Neto: $" + precioNeto.toFixed(2) + "</p>" +
                          "<p>Beneficio (10%): $" + beneficio.toFixed(2) + "</p>" +
                          "<p>IVA (21%): $" + iva.toFixed(2) + "</p>" +
                          "<p><strong>Total: $" + precioVenta.toFixed(2) + "</strong></p>";

      document.getElementById("resultado").innerHTML = resultadoHTML;
    };
  </script>

</body>

</html>
