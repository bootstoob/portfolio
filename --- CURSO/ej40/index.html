<!DOCTYPE html>

<body>

  <h1>Ejercicio 40:</h1>
  <p>
    Rellena un array con números aleatorios (10 por ejemplo). Muéstralo por la
    consola.
  </p>

  <hr>

  <div id="asistentes"></div>


  <script>
    var numerosAleatorios = [];
    var cantidad = 10;
    for (var i = 0; i < cantidad; i++) {
      var numero = Math.floor(Math.random() * cantidad) + 1;
      numerosAleatorios.push(numero);
    }


    console.log(cantidad +" - Números aleatorios:", numerosAleatorios);
  </script>
</body>

</html>
