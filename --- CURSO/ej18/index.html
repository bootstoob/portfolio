<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
</head>

<body>

  <h1>Ejercicio 18: </h1>
  <p>
    Con la sentencia while y la directiva break realizar una web donde
    aparezcan escritos los números del 1 al 100.(document.write)
  </p>

  <script>
    var numero = 1;
    while (true) {
      document.write(numero + ', ');
      console.log(numero);

      numero++;
      if (numero > 100) {
        break;
      }

    }
  </script>

</body>

</html>
