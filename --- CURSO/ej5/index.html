<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
</head>

<body>

  <h1>Verificar Mes del Año</h1>

  <form id="mesForm">
    <label for="numeroMes">Introduce un número del 1 al 12:</label>
    <input type="number" id="numeroMes" name="numeroMes" min="1" max="12" required>
    <br>
    <button type="submit">Verificar</button>
  </form>

  <div id="resultado"></div>

  <script>
    mesForm.onsubmit = function (event) {
      event.preventDefault();

      var numeroMes = parseInt(document.getElementById("numeroMes").value);

      switch (numeroMes) {
        case 1:
          mes = "Enero";
          break;
        case 2:
          mes = "Febrero";
          break;
        case 3:
          mes = "Marzo";
          break;
        case 4:
          mes = "Abril";
          break;
        case 5:
          mes = "Mayo";
          break;
        case 6:
          mes = "Junio";
          break;
        case 7:
          mes = "Julio";
          break;
        case 8:
          mes = "Agosto";
          break;
        case 9:
          mes = "Septiembre";
          break;
        case 10:
          mes = "Octubre";
          break;
        case 11:
          mes = "Noviembre";
          break;
        case 12:
          mes = "Diciembre";
          break;
        default:
          mes = "Error: El número de mes debe estar entre 1 y 12";
      }

      document.getElementById("resultado").innerText = mes;
    };
  </script>

</body>

</html>
